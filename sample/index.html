<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>LED 开关控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            gap: 40px;
        }
        .led-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #666;
            background: #999;
            box-shadow: inset 0 0 20px #777;
            transition: all 0.3s ease;
        }
        .led-on {
            background: #ffd700;
            box-shadow: 0 0 40px #ffd700, inset 0 0 20px #ffec8b;
        }
        .led-off {
            background: #999;
            box-shadow: inset 0 0 20px #777;
        }
        #toggleBtn {
            padding: 12px 36px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #2196F3;
            color: #fff;
            cursor: pointer;
            /* 阴影模拟凸起按钮 */
            box-shadow: 0 6px 0 #1565C0, 0 8px 10px rgba(0,0,0,0.15);
            transition: all 0.1s ease;
        }
        /* 鼠标悬浮 */
        #toggleBtn:hover {
            background: #1976D2;
        }
        /* 鼠标按下：下压效果 */
        #toggleBtn:active {
            /* 向下位移 + 缩小阴影，模拟按下去 */
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1565C0, 0 4px 6px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="led-icon led-off" id="ledIcon"></div>
    <button id="toggleBtn">切换 LED 状态</button>

    <script>
        const BASE_URL = "http://localhost:8080";
        const CMD_API = `${BASE_URL}/cmd`;
        const LOG_API = `${BASE_URL}/getLog`;

        const ledIcon = document.getElementById('ledIcon');
        const toggleBtn = document.getElementById('toggleBtn');
        let currentLedState = "off";

        // 轮询获取LED状态
        function syncStatus() {
            fetch(`${LOG_API}?t=${Date.now()}`)
            .then(res => res.text())
            .then(txt => {
                if(!txt) return;
                try {
                    const obj = JSON.parse(txt);
                    currentLedState = obj.led;
                    ledIcon.className = currentLedState === "on" ? "led-icon led-on" : "led-icon led-off";
                } catch (e) {}
            })
            .catch(err => console.error("读取状态失败", err));
        }

        // 点击按钮发送指令
        toggleBtn.addEventListener('click', () => {
            const target = currentLedState === "on" ? "off" : "on";
            const sendJson = JSON.stringify({ led: target });

            fetch(CMD_API, {
                method: "POST",
                body: sendJson,
                headers: {
                    "Content-Type": "text/plain"
                }
            }).catch(err => console.error("发送指令失败", err));
        });

        setInterval(syncStatus, 2500);
        syncStatus();
    </script>
</body>
</html>
