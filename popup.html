<!DOCTYPE html>
<html style="width: 220px; padding: 12px; font-family: sans-serif;">
<head>
    <meta charset="UTF-8">
    <title>Bridge Config</title>
    <style>
        .row {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        label {
            font-size: 14px;
        }
        input {
            width: 130px;
            padding: 4px;
            font-size: 13px;
        }
        button {
            width: 100%;
            padding: 6px;
            background: #2196F3;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 20px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #2196F3;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="row">
        <label for="baseUrl">Server:</label>
        <input type="text" id="baseUrl" placeholder="http://localhost:8080">
    </div>
    <div class="row">
        <label for="enableToggle">Enable Bridge:</label>
        <label class="toggle-switch">
            <input type="checkbox" id="enableToggle">
            <span class="slider"></span>
        </label>
    </div>
    <button id="saveBtn">Save Settings</button>

    <script src="popup.js"></script>
</body>
</html>
